version: 2

project_name: gpm

builds:
  - id: gpm
    main: .
    binary: gpm
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: binaries
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

# ── Keyless signing via Sigstore/cosign ────────────────────────────────────────
# Signs the checksums file using cosign's keyless (OIDC) workflow.
# Requires: sigstore/cosign-installer step + id-token: write permission in the
# release workflow. Produces checksums.txt.sig and checksums.txt.pem alongside
# every release.
signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
    artifacts: checksum
    output: true

# ── Homebrew tap ──────────────────────────────────────────────────────────────
# Publishes a cask to ks1686/homebrew-tap on every non-prerelease tag.
# Requires secret: HOMEBREW_TAP_GITHUB_TOKEN (fine-grained PAT with
# Contents: read+write on the homebrew-tap repo).
#
# Install after setup:
#   brew tap ks1686/tap
#   brew install gpm
homebrew_casks:
  - name: gpm
    repository:
      owner: ks1686
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ks1686/gpm"
    description: "Track, sync, and reproduce your software environment across Linux, macOS, and WSL2."
    license: MIT
    skip_upload: auto  # skips pre-releases automatically

# ── AUR (Arch User Repository) ────────────────────────────────────────────────
# Publishes a PKGBUILD to aur.archlinux.org/gpm-bin.git on every non-prerelease.
# Package name is gpm-bin ("gpm" is taken by the General Purpose Mouse daemon).
#
# Requires secret: AUR_KEY (SSH private key of an AUR account that owns gpm-bin).
# One-time manual step: create the AUR package at https://aur.archlinux.org/
# before the first automated publish (GoReleaser only updates, not creates).
#
# Install after setup:
#   paru -S gpm-bin   # or yay, or manual makepkg
aurs:
  - name: gpm-bin
    homepage: "https://github.com/ks1686/gpm"
    description: "Track, sync, and reproduce your software environment across Linux, macOS, and WSL2."
    maintainers:
      - "ks1686 <ks1686@users.noreply.github.com>"
    license: MIT
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/gpm-bin.git"
    package: |-
      install -Dm755 "./gpm" "${pkgdir}/usr/bin/gpm"
    commit_author:
      name: ks1686
      email: ks1686@users.noreply.github.com
    skip_upload: auto  # skips pre-releases automatically

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'