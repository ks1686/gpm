version: 2

project_name: genv

builds:
  - id: genv
    main: .
    binary: genv
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: binaries
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    extra_files:
      - glob: completions/*

checksum:
  name_template: checksums.txt

# ── Keyless signing via Sigstore/cosign ────────────────────────────────────────
# Signs the checksums file using cosign's keyless (OIDC) workflow.
# Requires: sigstore/cosign-installer step + id-token: write permission in the
# release workflow. Produces checksums.txt.sig and checksums.txt.pem alongside
# every release.
signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
    artifacts: checksum
    output: true

# ── Homebrew tap ──────────────────────────────────────────────────────────────
# Publishes a cask to ks1686/homebrew-tap on every non-prerelease tag.
# Requires secret: HOMEBREW_TAP_GITHUB_TOKEN (fine-grained PAT with
# Contents: read+write on the homebrew-tap repo).
#
# Install after setup:
#   brew tap ks1686/tap
#   brew install genv
homebrew_casks:
  - name: genv
    repository:
      owner: ks1686
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ks1686/genv"
    description: "Track, sync, and reproduce your software environment across Linux, macOS, and WSL2."
    license: MIT
    skip_upload: auto  # skips pre-releases automatically


changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'