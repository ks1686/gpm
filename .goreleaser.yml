version: 2

project_name: genv

builds:
  - id: genv
    main: .
    binary: genv
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}

archives:
  - id: binaries
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: completions/*

# ── Native package formats (.deb, .rpm, .apk) ─────────────────────────────────
# Generates installable packages for Debian/Ubuntu (.deb), Fedora/RHEL (.rpm),
# and Alpine Linux (.apk). Artifacts are uploaded to GitHub Releases so users
# can install directly without a repo server:
#   dpkg -i genv_*.deb
#   rpm -i genv_*.rpm
#   apk add --allow-untrusted genv_*.apk
nfpms:
  - id: packages
    package_name: genv
    vendor: ks1686
    homepage: https://github.com/ks1686/genv
    maintainer: ks1686 <ks1686@users.noreply.github.com>
    description: Track, sync, and reproduce your software environment across Linux, macOS, and WSL2.
    license: MIT
    formats:
      - deb
      - rpm
      - apk

    contents:
      - src: completions/genv.bash
        dst: /usr/share/bash-completion/completions/genv
      - src: completions/genv.zsh
        dst: /usr/share/zsh/site-functions/_genv
      - src: completions/genv.fish
        dst: /usr/share/fish/vendor_completions.d/genv.fish

checksum:
  name_template: checksums.txt

# ── Keyless signing via Sigstore/cosign ────────────────────────────────────────
# Signs the checksums file using the cosign keyless (OIDC) workflow.
# Requires: sigstore/cosign-installer step + id-token: write permission in the
# release workflow. Produces checksums.txt.sig and checksums.txt.pem alongside
# every release.
signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - ${artifact}
    artifacts: checksum
    output: true

# ── Homebrew tap ──────────────────────────────────────────────────────────────
# Publishes a cask to ks1686/homebrew-tap on every non-prerelease tag.
# Requires secret: HOMEBREW_TAP_GITHUB_TOKEN (fine-grained PAT with
# Contents: read+write on the homebrew-tap repo).
#
# Install after setup:
#   brew tap ks1686/tap
#   brew install genv
homebrew_casks:
  - name: genv
    repository:
      owner: ks1686
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ks1686/genv"
    description: "Track, sync, and reproduce your software environment across Linux, macOS, and WSL2."
    license: MIT
    skip_upload: auto  # skips pre-releases automatically

# ── Snap Store ────────────────────────────────────────────────────────────────
# Publishes a snap to the Snap Store on every non-prerelease tag.
# Requires secret: SNAPCRAFT_STORE_CREDENTIALS
#
# Install after setup:
#   snap install genv
snapcrafts:
  - name: genv
    summary: "Declarative package and environment manager for Linux, macOS, and WSL2."
    description: "genv is a command-line tool to track, sync, and reproduce your software environment across Linux, macOS, and WSL2. It helps you manage packages, environment variables, and shell configuration declaratively."
    license: MIT
    grade: stable
    confinement: strict
    # Set this to true to publish to the Snap Store.
    publish: true



changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'