name: Distro Integration Tests

on:
  push:
  pull_request:

permissions:
  contents: read

# This file tests each adapter against a real package-manager binary.
# It is separate from ci.yml (unit tests + vet + fmt) so the fast checks
# are not blocked by slower distro jobs.
#
# Each job runs two test suites:
#   1. Adapter-layer tests  (internal/adapter/) — verify Available()/Query()/PlanInstall shape.
#   2. End-to-end tests     (e2e/)              — build the real genv binary and exercise
#                                                  every M1/M2 command with real installs.
#
# Skipped adapters and reasons:
#   snap        — snapd requires a live systemd session; Docker containers
#                 do not run systemd, so snap commands fail unconditionally.
#                 Test manually on a real Ubuntu host with snapd running.
#   linuxbrew   — Same time/caching constraint as brew on Linux runners.
#   macports    — Not pre-installed on GitHub's macOS runners; tested manually.
#
# Partially limited adapters:
#   emerge      — E2E tests run with canInstall:false because emerge compiles
#                 from source; real installs are too slow for CI (~10 min/pkg).
#                 Adapter-shape tests (Available/Query/PlanInstall) run fully.

jobs:
  # ── Adapters that work as root inside a container ───────────────────────────
  # GitHub Actions' container: directive starts the image and runs every step
  # inside it. actions/checkout needs git; actions/setup-go needs curl+tar
  # (both present in these base images after the prereqs step).
  # gcc is required so that go test -race can link the ThreadSanitizer runtime.
  adapters:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04 (apt)
            image: ubuntu:24.04
            prereqs: apt-get update -qq && apt-get install -y -qq git gcc sudo
            adapter: TestApt
            e2eTest: TestE2EApt

          - distro: debian-bookworm (apt)
            image: debian:bookworm
            prereqs: apt-get update -qq && apt-get install -y -qq git gcc sudo
            adapter: TestApt
            e2eTest: TestE2EApt

          - distro: fedora-latest (dnf)
            image: fedora:latest
            prereqs: dnf install -y git gcc sudo
            adapter: TestDnf
            e2eTest: TestE2EDnf

          - distro: arch-latest (pacman)
            image: archlinux:latest
            prereqs: pacman -Syu --noconfirm && pacman -S --noconfirm git gcc sudo
            adapter: TestPacman
            e2eTest: TestE2EPacman

          - distro: ubuntu-24.04 (flatpak)
            image: ubuntu:24.04
            prereqs: apt-get update -qq && apt-get install -y -qq git gcc flatpak sudo
            adapter: TestFlatpak
            e2eTest: TestE2EFlatpak

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Install prerequisites
        run: ${{ matrix.prereqs }}

      - name: Configure passwordless sudo
        run: |
          echo 'root ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          echo 'Defaults !requiretty' >> /etc/sudoers

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Adapter integration test — ${{ matrix.adapter }}
        run: go test -tags integration -race -v -run ${{ matrix.adapter }} ./internal/adapter/

      - name: E2E test — ${{ matrix.e2eTest }}
        run: go test -tags integration -race -v -run ${{ matrix.e2eTest }} ./e2e/

  # ── Alpine (apk) ─────────────────────────────────────────────────────────────
  # Alpine uses musl libc. GitHub Actions' injected Node.js binary is glibc-
  # compiled, so the container: directive approach is unreliable on Alpine.
  # Using docker run (same pattern as paru/yay) sidesteps the issue entirely.
  apk:
    name: alpine-latest (apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration and E2E tests inside Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/host-workspace:ro" \
            alpine:latest \
            sh -c '
              set -euo pipefail

              echo "==> Installing build dependencies"
              apk add --no-cache git gcc sudo bash curl musl-dev

              echo "==> Configuring passwordless sudo"
              echo "root ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              echo "Defaults !requiretty" >> /etc/sudoers

              echo "==> Installing Go"
              GOVERSION=$(grep "^go " /host-workspace/go.mod | awk "{print \$2}")
              curl -fsSL "https://go.dev/dl/go${GOVERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
              tar -C /usr/local -xzf /tmp/go.tar.gz
              ln -sf /usr/local/go/bin/go /usr/local/bin/go

              echo "==> Copying workspace"
              cp -r /host-workspace /root/genv

              echo "==> Running adapter integration tests"
              cd /root/genv
              go test -tags integration -race -v -run TestApk ./internal/adapter/

              echo "==> Running E2E tests"
              go test -tags integration -race -v -run TestE2EApk ./e2e/
            '

  # ── openSUSE (zypper) ────────────────────────────────────────────────────────
  zypper:
    name: opensuse-tumbleweed (zypper)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration and E2E tests inside openSUSE container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/host-workspace:ro" \
            opensuse/tumbleweed:latest \
            bash -c '
              set -euo pipefail

              echo "==> Installing build dependencies"
              zypper --non-interactive install git gcc sudo curl bash gawk

              echo "==> Configuring passwordless sudo"
              echo "root ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              echo "Defaults !requiretty" >> /etc/sudoers

              echo "==> Installing Go"
              GOVERSION=$(grep "^go " /host-workspace/go.mod | awk "{print \$2}")
              curl -fsSL "https://go.dev/dl/go${GOVERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
              tar -C /usr/local -xzf /tmp/go.tar.gz
              ln -sf /usr/local/go/bin/go /usr/local/bin/go

              echo "==> Copying workspace"
              cp -r /host-workspace /root/genv

              echo "==> Running adapter integration tests"
              cd /root/genv
              go test -tags integration -race -v -run TestZypper ./internal/adapter/

              echo "==> Running E2E tests"
              go test -tags integration -race -v -run TestE2EZypper ./e2e/
            '

  # ── paru (Arch AUR helper) ───────────────────────────────────────────────────
  # paru refuses ALL operations when run as root, including read-only -Qi
  # queries. The container: approach runs steps as root, so it cannot be
  # used here. Instead we spin up an Arch container via docker run, build
  # paru from AUR as a non-root builder user, then run the tests as that
  # same user. Go is installed to /usr/local so both root and builder can
  # reach it; the workspace is copied to builder's home for write access.
  paru:
    name: arch-latest (paru)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build paru and run integration tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/host-workspace:ro" \
            archlinux:latest \
            bash -c '
              set -euo pipefail

              echo "==> Updating system and installing build dependencies"
              pacman -Syu --noconfirm
              pacman -S --noconfirm base-devel git curl sudo

              echo "==> Installing Go from go.dev"
              GOVERSION=$(grep "^go " /host-workspace/go.mod | awk "{print \$2}")
              curl -fsSL "https://go.dev/dl/go${GOVERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
              tar -C /usr/local -xzf /tmp/go.tar.gz
              ln -sf /usr/local/go/bin/go /usr/local/bin/go
              ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt

              echo "==> Creating non-root builder user"
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              echo "==> Building paru from AUR as builder"
              su -s /bin/bash builder -c "
                git clone https://aur.archlinux.org/paru.git /tmp/paru
                cd /tmp/paru
                makepkg -si --noconfirm
              "

              echo "==> Copying workspace and fixing ownership"
              cp -r /host-workspace /home/builder/genv
              chown -R builder:builder /home/builder/genv

              echo "==> Running adapter integration tests as builder"
              su -s /bin/bash builder -c "
                cd /home/builder/genv
                go test -tags integration -race -v -run TestParu ./internal/adapter/
              "

              echo "==> Running E2E tests as builder"
              su -s /bin/bash builder -c "
                cd /home/builder/genv
                go test -tags integration -race -v -run TestE2EParu ./e2e/
              "
            '

  # ── yay (Arch AUR helper) ────────────────────────────────────────────────────
  # Same root-refusal constraint as paru; identical structure with yay
  # substituted for paru in the AUR clone and the test -run filter.
  yay:
    name: arch-latest (yay)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build yay and run integration tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/host-workspace:ro" \
            archlinux:latest \
            bash -c '
              set -euo pipefail

              echo "==> Updating system and installing build dependencies"
              pacman -Syu --noconfirm
              pacman -S --noconfirm base-devel git curl sudo

              echo "==> Installing Go from go.dev"
              GOVERSION=$(grep "^go " /host-workspace/go.mod | awk "{print \$2}")
              curl -fsSL "https://go.dev/dl/go${GOVERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
              tar -C /usr/local -xzf /tmp/go.tar.gz
              ln -sf /usr/local/go/bin/go /usr/local/bin/go
              ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt

              echo "==> Creating non-root builder user"
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              echo "==> Building yay from AUR as builder"
              su -s /bin/bash builder -c "
                git clone https://aur.archlinux.org/yay.git /tmp/yay
                cd /tmp/yay
                makepkg -si --noconfirm
              "

              echo "==> Copying workspace and fixing ownership"
              cp -r /host-workspace /home/builder/genv
              chown -R builder:builder /home/builder/genv

              echo "==> Running adapter integration tests as builder"
              su -s /bin/bash builder -c "
                cd /home/builder/genv
                go test -tags integration -race -v -run TestYay ./internal/adapter/
              "

              echo "==> Running E2E tests as builder"
              su -s /bin/bash builder -c "
                cd /home/builder/genv
                go test -tags integration -race -v -run TestE2EYay ./e2e/
              "
            '

  # ── Nix ──────────────────────────────────────────────────────────────────────
  # nixos/nix is a glibc-based image, so the container: approach would work,
  # but nix requires /nix to exist and the daemon running. Using docker run
  # with --privileged lets nix start its daemon inside the container.
  nix:
    name: nixos-nix (nix)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration and E2E tests inside nixos/nix container
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}:/host-workspace:ro" \
            nixos/nix \
            sh -c '
              set -eu

              echo "==> Installing build dependencies"
              nix-env -iA nixpkgs.gcc nixpkgs.gawk nixpkgs.curl

              echo "==> Installing Go"
              GOVERSION=$(grep "^go " /host-workspace/go.mod | awk "{print \$2}")
              curl -fsSL "https://go.dev/dl/go${GOVERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
              mkdir -p /usr/local/bin
              tar -C /usr/local -xzf /tmp/go.tar.gz
              ln -sf /usr/local/go/bin/go /usr/local/bin/go
              export PATH="/usr/local/bin:$PATH"

              echo "==> Installing hello (probe package for integration tests)"
              nix-env -iA nixpkgs.hello

              echo "==> Nix profile debug"
              nix-env -q || true
              echo "--- nix-env -q --installed curl ---"
              nix-env -q --installed curl || true
              echo "--- nix-env -q --installed '^curl-' ---"
              nix-env -q --installed "^curl-" || true

              echo "==> Copying workspace"
              cp -r /host-workspace /root/genv

              echo "==> Running adapter integration tests"
              cd /root/genv
              go test -tags integration -race -v -run TestNix ./internal/adapter/

              echo "==> Running E2E tests"
              go test -tags integration -race -v -run TestE2ENix ./e2e/
            '

  # ── Gentoo (emerge) ──────────────────────────────────────────────────────────
  # emerge compiles packages from source, so E2E tests run with canInstall:
  # false (spec/lock mutations and dry-run only — no real installs).
  # The adapter integration tests verify Available()/Query()/PlanInstall shape
  # against the real emerge binary that ships in the stage3 image.
  # emerge-webrsync fetches a portage snapshot (~60 MB) rather than doing a
  # full rsync, which is significantly faster.
  # portage-utils (qlist) and sudo are compiled from source; curl is used to
  # download Go. The job is expected to take ~10 min due to source builds.
  emerge:
    name: gentoo-stage3 (emerge)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration and E2E tests inside Gentoo container
        timeout-minutes: 30
        run: |
          WORKSPACE="${{ github.workspace }}"
          docker run --rm \
            -v "${WORKSPACE}:/host-workspace:ro" \
            gentoo/stage3 \
            bash -c '
              set -euo pipefail

              echo "==> Syncing portage snapshot"
              emerge-webrsync -q

              echo "==> Installing build dependencies (source; gcc already in stage3)"
              emerge --jobs=$(nproc) --ask=n -q net-misc/curl app-portage/portage-utils app-admin/sudo

              echo "==> Configuring passwordless sudo"
              echo "root ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              echo "Defaults !requiretty" >> /etc/sudoers

              echo "==> Installing Go"
              GOVERSION=$(grep "^go " /host-workspace/go.mod | awk "{print \$2}")
              curl -fsSL "https://go.dev/dl/go${GOVERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
              tar -C /usr/local -xzf /tmp/go.tar.gz
              ln -sf /usr/local/go/bin/go /usr/local/bin/go

              echo "==> Copying workspace"
              cp -r /host-workspace /root/genv

              echo "==> Running adapter integration tests"
              cd /root/genv
              go test -tags integration -race -v -run TestEmerge ./internal/adapter/

              echo "==> Running E2E tests (no-install mode)"
              go test -tags integration -race -v -run TestE2EEmerge ./e2e/
            '

  # ── Void Linux (xbps) ────────────────────────────────────────────────────────
  # The official glibc "full" image from ghcr.io/void-linux/void-linux is used;
  # it is glibc-based so the container: directive would work, but docker run is
  # used for consistency with the other non-standard-distro jobs.
  xbps:
    name: void-linux (xbps)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run integration and E2E tests inside Void Linux container
        run: |
          WORKSPACE="${{ github.workspace }}"
          docker run --rm \
            -v "${WORKSPACE}:/host-workspace:ro" \
            ghcr.io/void-linux/void-linux:latest-full-x86_64 \
            sh -c '
              set -eu

              echo "==> Self-updating xbps and package index"
              xbps-install -Syu xbps
              xbps-install -S

              echo "==> Installing build dependencies"
              xbps-install -Sy gcc sudo curl gawk

              echo "==> Configuring passwordless sudo"
              echo "root ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
              echo "Defaults !requiretty" >> /etc/sudoers

              echo "==> Installing Go"
              GOVERSION=$(grep "^go " /host-workspace/go.mod | awk "{print \$2}")
              curl -fsSL "https://go.dev/dl/go${GOVERSION}.linux-amd64.tar.gz" -o /tmp/go.tar.gz
              tar -C /usr/local -xzf /tmp/go.tar.gz
              ln -sf /usr/local/go/bin/go /usr/local/bin/go

              echo "==> Copying workspace"
              cp -r /host-workspace /root/genv

              echo "==> Running adapter integration tests"
              cd /root/genv
              go test -tags integration -race -v -run TestXbps ./internal/adapter/

              echo "==> Running E2E tests"
              go test -tags integration -race -v -run TestE2EXbps ./e2e/
            '

  # ── macOS (brew) ─────────────────────────────────────────────────────────────
  # GitHub's macos-latest runner has Homebrew pre-installed, so no setup is
  # needed. brew install is slow (~20s per package) so this job is expected
  # to take several minutes.
  macos:
    name: macos-latest (brew)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Adapter integration test — TestBrew
        run: go test -tags integration -race -v -run TestBrew ./internal/adapter/

      - name: E2E test — TestE2EBrew
        run: go test -tags integration -race -v -run TestE2EBrew ./e2e/
